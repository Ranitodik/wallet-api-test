services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/wallets
      - PYTHONPATH=/app
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wallets
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"